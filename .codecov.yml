coverage:
  status:
    patch:
      default:
        # BDD (behave) tests are not collected by pytest-cov, so rendering-heavy
        # modules are only partially covered by unit tests. 70% patch coverage is
        # the minimum we enforce; the overall project target remains 80%.
        target: 70%
        threshold: 5%
    project:
      default:
        target: 80%
        threshold: 2%

comment:
  layout: "reach,diff,flags,files"
  behavior: default
