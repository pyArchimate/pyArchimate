name: Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  # ── Gate: run comprehensive tests on all supported versions ────────────────
  #
  test:
    name: Test gate (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Ensure Poetry in PATH (Windows)
        if: runner.os == 'Windows'
        run: |
          python -m pip install --upgrade poetry  # NOSONAR S8544 S8541

      - name: Cache virtualenv
        if: matrix.python-version < '3.14'
        uses: actions/cache@v5
        with:
          path: .venv
          key: venv-${{ runner.os }}-py${{ matrix.python-version }}-${{ hashFiles('poetry.lock') }}
          restore-keys: |
            venv-${{ runner.os }}-py${{ matrix.python-version }}-

      - name: Install dependencies
        run: python -m pip install poetry && poetry install --no-interaction --no-root  # NOSONAR S8544

      - name: Run pytest
        run: poetry run pytest --cov --cov-branch --cov-report=xml

      - name: Run behave
        run: poetry run behave tests/features/

  # ── Build & publish to PyPI ───────────────────────────────────────────────
  publish:
    name: Build and publish to PyPI
    needs: test
    runs-on: ubuntu-latest

    environment:
      name: pypi
      url: https://pypi.org/p/pyArchimate

    permissions:
      id-token: write   # required for OIDC trusted publishing

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        uses: snok/install-poetry@v1

      - name: Sync version from tag
        # Tag v1.2.0 → package version 1.2.0
        run: poetry version "${GITHUB_REF_NAME#v}"

      - name: Build sdist and wheel
        run: poetry build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
